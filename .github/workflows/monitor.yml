name: KRX 추세·골든크로스 모니터

on:
  schedule:
    # GitHub Actions cron 은 UTC 기준.
    # 09:00 UTC = 18:00 KST (장 마감 15:30 이후), 월~금 실행.
    - cron: "0 9 * * 1-5"
  workflow_dispatch:        # 수동 실행 버튼 (Actions 탭에서)
    inputs:
      dry_run:
        description: "전송 없이 콘솔 미리보기"
        type: boolean
        default: false
      as_of:
        description: "기준일 YYYY-MM-DD (비우면 최근 거래일)"
        type: string
        default: ""

# 동시에 한 번만 실행 (캐시 경쟁 방지)
concurrency:
  group: krx-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 의존성 설치
        run: pip install -r requirements.txt

      # 가격 이력 parquet 캐시 '복원'. 저장은 마지막에 별도 스텝에서 always 로 수행.
      - name: 가격 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: data
          key: prices-${{ github.run_id }}
          restore-keys: |
            prices-

      - name: 모니터 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 첫 백필을 빠르게: 동시 수집 워커 수 / 중간 저장 주기
          BACKFILL_WORKERS: "8"
          BACKFILL_SAVE_EVERY: "300"
          # 시가총액 1000억 이상만 모니터링
          MIN_MARKET_CAP: "100000000000"
          # 필요 시 여기서 파라미터 오버라이드 가능
          # MA_LONG: "200"
          # SIGNAL_LOOKBACK: "1"
        run: |
          ARGS="-v"
          # 자동(스케줄) 실행만 거래일 가드 적용. 수동 실행은 항상 전송.
          if [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --skip-if-closed"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.as_of }}" ]; then
            ARGS="$ARGS --as-of ${{ github.event.inputs.as_of }}"
          fi
          echo "실행: python run.py $ARGS"
          python run.py $ARGS

      # 백필 진행분을 항상 저장 → 도중에 끊겨도 다음 실행에서 이어받음.
      - name: 가격 캐시 저장
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: prices-${{ github.run_id }}
